<?xml version="1.0" encoding="UTF-8"?>
<!--
  先芯入り作業スニーカー (作業靴)。
  安全靴の中でもスニーカータイプ: ローカット・耐滑ソール・つま先先芯バンド付き。
  helmet.png と統一感を持たせるため太め outline + 暖色系配色。
  旧ブーツ版に戻したいときは caution/page.tsx の img src を safety-shoes-boots.png に変更。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420">
  <defs>
    <!-- 本体の濃紺グラデ -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5998"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <!-- ソール(耐滑ラバー) -->
    <linearGradient id="sole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- 先芯ハイライト(金属色) -->
    <linearGradient id="toecap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- 影 -->
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 地面の影 -->
  <ellipse cx="280" cy="390" rx="210" ry="14" fill="url(#shadow)"/>

  <!-- ━━ ソール(厚めの耐滑ラバー底) ━━ -->
  <path d="
    M 60 340
    Q 55 310, 75 305
    L 455 300
    Q 500 302, 505 325
    Q 508 360, 475 372
    L 95 376
    Q 55 374, 60 340 Z"
    fill="url(#sole)" stroke="#1a3a6b" stroke-width="6" stroke-linejoin="round"/>
  <!-- ソールの中線(ミッドソール) -->
  <path d="M 65 330 L 500 326" stroke="#1a3a6b" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- ソール裏のトレッドパターン(省略表現) -->
  <g stroke="#64748b" stroke-width="3" opacity="0.4">
    <line x1="130" y1="360" x2="130" y2="374"/>
    <line x1="180" y1="360" x2="180" y2="374"/>
    <line x1="230" y1="360" x2="230" y2="374"/>
    <line x1="280" y1="360" x2="280" y2="374"/>
    <line x1="330" y1="360" x2="330" y2="374"/>
    <line x1="380" y1="360" x2="380" y2="374"/>
    <line x1="430" y1="360" x2="430" y2="374"/>
  </g>

  <!-- ━━ シューズ本体(アッパー) ━━ -->
  <path d="
    M 95 310
    Q 85 275, 95 230
    Q 115 180, 155 155
    L 205 135
    Q 250 122, 295 130
    L 395 150
    Q 450 170, 475 210
    Q 495 260, 485 305
    L 95 310 Z"
    fill="url(#body)" stroke="#0f1f3d" stroke-width="7" stroke-linejoin="round"/>

  <!-- ━━ 先芯ハイライトバンド(つま先補強) ━━ -->
  <path d="
    M 390 150
    Q 455 170, 478 218
    Q 485 245, 483 278
    L 385 275
    Q 380 200, 390 150 Z"
    fill="url(#toecap)" stroke="#7c2d12" stroke-width="5" stroke-linejoin="round"/>
  <!-- 先芯の"STEEL TOE"感を出すリベット線 -->
  <g fill="#7c2d12">
    <circle cx="408" cy="170" r="3"/>
    <circle cx="438" cy="182" r="3"/>
    <circle cx="462" cy="208" r="3"/>
    <circle cx="474" cy="240" r="3"/>
    <circle cx="477" cy="270" r="3"/>
  </g>

  <!-- ━━ 履き口(くるぶし部分) ━━ -->
  <path d="
    M 125 170
    Q 145 145, 190 142
    L 245 145
    Q 260 150, 262 175
    Q 258 195, 235 200
    L 180 204
    Q 140 205, 125 170 Z"
    fill="#e2e8f0" stroke="#0f1f3d" stroke-width="5" stroke-linejoin="round"/>
  <!-- パッド表現 -->
  <path d="M 135 178 Q 200 165, 250 180" fill="none" stroke="#94a3b8" stroke-width="3" opacity="0.7"/>

  <!-- ━━ タン(ベロ)とレース(靴ひも) ━━ -->
  <path d="
    M 200 210
    Q 215 195, 260 200
    L 320 215
    Q 340 220, 340 250
    L 330 275
    Q 280 260, 220 255
    Q 195 245, 200 210 Z"
    fill="#f1f5f9" stroke="#0f1f3d" stroke-width="4" stroke-linejoin="round"/>

  <!-- 靴ひも(クロス) -->
  <g stroke="#1e293b" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M 225 220 L 310 230"/>
    <path d="M 230 235 L 315 245"/>
    <path d="M 235 250 L 320 262"/>
  </g>
  <!-- ひも穴(鳩目) -->
  <g fill="#fbbf24" stroke="#7c2d12" stroke-width="2">
    <circle cx="222" cy="220" r="4"/>
    <circle cx="313" cy="228" r="4"/>
    <circle cx="227" cy="235" r="4"/>
    <circle cx="318" cy="243" r="4"/>
    <circle cx="232" cy="250" r="4"/>
    <circle cx="323" cy="260" r="4"/>
  </g>
  <!-- 蝶結び -->
  <path d="
    M 260 215
    Q 245 205, 248 215
    Q 252 225, 265 222
    Q 278 225, 282 215
    Q 285 205, 270 215 Z"
    fill="#f8fafc" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

  <!-- ━━ サイドのストライプ(視認性向上の再帰反射風) ━━ -->
  <path d="M 140 250 Q 210 285, 340 295" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <path d="M 145 265 Q 210 295, 335 305" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- ━━ ロゴ(シンプルなマーク) ━━ -->
  <g transform="translate(155, 240)" opacity="0.85">
    <circle cx="0" cy="0" r="14" fill="#fff" stroke="#0f1f3d" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="14" fill="#0f1f3d">S</text>
  </g>

  <!-- ━━ 「先芯入り」の小さな指示線+ラベル ━━ -->
  <g>
    <path d="M 435 120 L 448 165" stroke="#7c2d12" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
    <rect x="360" y="90" width="160" height="34" rx="6" fill="#fff" stroke="#d97706" stroke-width="2.5"/>
    <text x="440" y="112" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#92400e">先芯入り</text>
  </g>
</svg>
